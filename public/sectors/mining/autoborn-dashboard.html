<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AutoBorn™ Master Sync Grid</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React UMD -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Recharts UMD (redundant providers) -->
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.7.2/umd/Recharts.min.js" crossorigin></script>
    <script src="https://unpkg.com/recharts@2.7.2/umd/Recharts.min.js" crossorigin></script>

    <!-- Babel for in‑browser JSX transform -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
      /* === helper === */
      const generatePulse = (base, vol = 1.8) => {
        const now = Date.now();
        return Array.from({ length: 9 }, (_, i) => ({
          time: new Date(now - (9 - i) * 1000).toLocaleTimeString(),
          value: +(base + (Math.random() - 0.5) * vol).toFixed(2),
        }));
      };

      /* === data === */
      const scrolls = [
        {
          id: 'scroll-9082',
          brand: 'AutoBorn™ Prime',
          icon: '🚗',
          type: 'Master Scroll',
          licenseFee: 'R12,000',
          monthly: 'R999 (Live)',
          royalty: '9.2% / Split: G',
          countdown: 42,
          vaultId: 'VAULT-092X-AUTO',
          claimRoot: 'https://faa.zone/claimroot/autoborn-prime',
          region: 'SA | EU | APAC',
          base: 84,
          color: '#facc15',
          link: '/sectors/mining/autoborn-dashboard.html',
        },
        {
          id: 'scroll-9083',
          brand: 'AutoBorn™ MinerLink',
          icon: '⛏️',
          type: 'Sub Scroll',
          licenseFee: 'R8,700',
          monthly: 'R760 (Node)',
          royalty: '6.1% / Split: L',
          countdown: 37,
          vaultId: 'VAULT-092X-MINER',
          claimRoot: 'https://faa.zone/claimroot/autoborn-minerlink',
          region: 'BRZ | SA',
          base: 79,
          color: '#60a5fa',
          link: '/sectors/mining/autoborn-dashboard.html',
        },
        {
          id: 'scroll-9084',
          brand: 'AutoBorn™ VaultMesh',
          icon: '📦',
          type: 'Deploy License',
          licenseFee: 'R15,400',
          monthly: 'R1,340 (HQ)',
          royalty: '10.5% / Split: R',
          countdown: 55,
          vaultId: 'VAULT-092X-MESH',
          claimRoot: 'https://faa.zone/claimroot/autoborn-vaultmesh',
          region: 'NAM | SA | DRC',
          base: 91,
          color: '#34d399',
          link: '/sectors/mining/autoborn-dashboard.html',
        },
      ];

      /* === minimal wrappers === */
      const Card = ({ children }) => (
        <div className="bg-white border shadow rounded-xl hover:shadow-md transition">
          {children}
        </div>
      );
      const CardContent = ({ children }) => <div className="p-4">{children}</div>;
      const Button = ({ children }) => (
        <button className="mt-4 w-full bg-black text-white text-sm py-2 rounded">{children}</button>
      );

      /* === main === */
      function App() {
        if (!(window.Recharts && window.Recharts.LineChart)) {
          return <p className="text-center text-red-600 mt-10">Loading charts…</p>;
        }
        const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = window.Recharts;

        const [pulses, setPulses] = React.useState(scrolls.map(s => ({ ...s, data: generatePulse(s.base) })));

        React.useEffect(() => {
          const id = setInterval(() => {
            setPulses(scrolls.map(s => ({ ...s, data: generatePulse(s.base) })));
          }, 3000);
          return () => clearInterval(id);
        }, []);

        return (
          <div className="p-6 max-w-7xl mx-auto text-gray-800 space-y-8">
            <h1 className="text-2xl font-bold text-indigo-600">🧬 AutoBorn™ Master Sync Grid</h1>
            {/* cards */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {pulses.map(scroll => (
                <a href={scroll.link} key={scroll.id} className="block">
                  <Card>
                    <CardContent>
                      <div className="flex justify-between items-center mb-2">
                        <h2 className="font-bold text-lg">{scroll.icon} {scroll.brand}</h2>
                        <span className="text-xs text-gray-500">{scroll.type}</span>
                      </div>
                      <p className="text-sm">💳 License Fee: {scroll.licenseFee}</p>
                      <p className="text-sm">📦 Monthly: {scroll.monthly}</p>
                      <p className="text-sm">💰 Royalty: {scroll.royalty}</p>
                      <p className="text-xs text-gray-600 mt-1">⏱ {scroll.countdown}s</p>
                      <p className="text-xs text-gray-600">🌍 {scroll.region}</p>
                      <p className="text-xs text-gray-500 mt-1">Vault ID: {scroll.vaultId}</p>
                      <a href={scroll.claimRoot} target="_blank" rel="noopener noreferrer" className="text-blue-600 text-xs underline inline-block mt-1">🌐 ClaimRoot™</a>
                      {/* progress */}
                      <div className="mt-4 h-2 w-full bg-gray-200 rounded">
                        <div className="bg-green-400 h-2 rounded" style={{ width: `${scroll.countdown}%` }}></div>
                      </div>
                      {/* chart */}
                      <div className="h-32 mt-4">
                        <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={scroll.data}>
                            <XAxis dataKey="time" hide />
                            <YAxis domain={['auto', 'auto']} hide />
                            <Tooltip />
                            <Line type="monotone" dataKey="value" stroke={scroll.color} strokeWidth={2} dot={false} />
                          </LineChart>
                        </ResponsiveContainer>
                      </div>
                      <Button>Pay with VaultPay™</Button>
                    </CardContent>
                  </Card>
                </a>
              ))}
            </div>
            {/* feature matrix */}
            <div className="mt-12 bg-white border-t pt-6">
              <h2 className="text-xl font-bold text-gray-800 mb-4">🔍 AutoBorn™ Feature Matrix</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {scrolls.map(scroll => (
                  <a href={scroll.link} key={scroll.id} className="block">
                    <div className="bg-gray-50 p-4 rounded-xl shadow-inner">
                      <h3 className="text-lg font-bold text-indigo-700 mb-2">{scroll.icon} {scroll.brand}</h3>
                      <ul className="list-disc list-inside text-sm text-gray-700 space-y-1">
                        <li>📛 Type: {scroll.type}</li>
                        <li>💸 License Fee: {scroll.licenseFee}</li>
                        <li>📦 Monthly: {scroll.monthly}</li>
                        <li>💰 Royalty Model: {scroll.royalty}</li>
                        <li>🌐 ClaimRoot™ enabled</li>
                        <li>🗺️ Region Deployment: {scroll.region}</li>
                        <li>⏱ Countdown Sync: {scroll.countdown}s</li>
                        <li>🧠 Vault ID: {scroll.vaultId}</li>
                        <li>📊 Live Pulse Chart Active</li>
                        <li>🪙 VaultPay™ Ready</li>
                      </ul>
                    </div>
                  </a>
                ))}
              </div>
            </div>
          </div>
        );
      }

      /* === mount: wait until LineChart available === */
      (function waitMount() {
        if (window.Recharts && window.Recharts.LineChart) {
          ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        } else {
          setTimeout(waitMount, 50);
        }
      })();
    </script>
  </body>
</html>
