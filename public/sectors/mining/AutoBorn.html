<!DOCTYPE html>
<html lang="en" class="bg-gray-100 text-gray-800 font-sans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧬 AutoBorn™ Master Sync Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>

  <!-- 🔷 Top Nav -->
  <nav class="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm">
    <div class="font-bold text-indigo-600 text-lg">🧬 FAA Sector Dashboard</div>
    <div class="space-x-4 text-sm text-gray-600">
      <a href="#">OreXcel™</a>
      <a href="#">Minerva™</a>
      <a href="#">Digium™</a>
      <a href="#">MineForge™</a>
      <a href="#">MineralVision™</a>
    </div>
    <div class="text-xs text-gray-400">FAA VaultMesh Active · Node: X13</div>
  </nav>

  <!-- 🔁 Back to Main -->
  <div class="p-4">
    <a href="/sectors/mining/autoborn.html" class="text-indigo-600 underline text-sm">← Return to Mining Sector: Autoborn™</a>
  </div>

  <!-- 🔮 Root Div for React/JSX Render -->
  <div id="autoborn-sync-root" class="max-w-7xl mx-auto p-4"></div>

  <!-- 💠 Script Bundle Entry -->
  <script type="module">
    import React, { useEffect, useState } from 'https://cdn.skypack.dev/react';
    import ReactDOM from 'https://cdn.skypack.dev/react-dom';
    import {
      LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer
    } from 'https://cdn.skypack.dev/recharts';

    const generatePulse = (base, volatility = 1.8) => {
      const now = Date.now();
      return Array.from({ length: 9 }, (_, i) => ({
        time: new Date(now - (9 - i) * 1000).toLocaleTimeString(),
        value: +(base + (Math.random() - 0.5) * volatility).toFixed(2),
      }));
    };

    const scrolls = [
      {
        id: 'scroll-9082',
        brand: 'AutoBorn™ Prime',
        icon: '🚗',
        type: 'Master Scroll',
        licenseFee: 'R12,000',
        monthly: 'R999 (Live)',
        royalty: '9.2% / Split: G',
        countdown: 42,
        vaultId: 'VAULT-092X-AUTO',
        claimRoot: 'https://faa.zone/claimroot/autoborn-prime',
        region: 'SA | EU | APAC',
        base: 84,
        color: '#facc15'
      },
      {
        id: 'scroll-9083',
        brand: 'AutoBorn™ MinerLink',
        icon: '⛏️',
        type: 'Sub Scroll',
        licenseFee: 'R8,700',
        monthly: 'R760 (Node)',
        royalty: '6.1% / Split: L',
        countdown: 37,
        vaultId: 'VAULT-092X-MINER',
        claimRoot: 'https://faa.zone/claimroot/autoborn-minerlink',
        region: 'BRZ | SA',
        base: 79,
        color: '#60a5fa'
      },
      {
        id: 'scroll-9084',
        brand: 'AutoBorn™ VaultMesh',
        icon: '📦',
        type: 'Deploy License',
        licenseFee: 'R15,400',
        monthly: 'R1,340 (HQ)',
        royalty: '10.5% / Split: R',
        countdown: 55,
        vaultId: 'VAULT-092X-MESH',
        claimRoot: 'https://faa.zone/claimroot/autoborn-vaultmesh',
        region: 'NAM | SA | DRC',
        base: 91,
        color: '#34d399'
      }
    ];

    function AutobornSyncGrid() {
      const [pulses, setPulses] = useState(scrolls.map(s => ({ ...s, data: generatePulse(s.base) })));

      useEffect(() => {
        const interval = setInterval(() => {
          setPulses(scrolls.map(s => ({ ...s, data: generatePulse(s.base) })));
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="p-6 text-gray-800 space-y-8">
          <h1 className="text-2xl font-bold text-indigo-600">🧬 AutoBorn™ Master Sync Grid</h1>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {pulses.map((scroll) => (
              <div key={scroll.id} className="bg-white border shadow rounded-xl hover:shadow-md transition p-4">
                <div className="flex justify-between items-center mb-2">
                  <h2 className="font-bold text-lg">{scroll.icon} {scroll.brand}</h2>
                  <span className="text-xs text-gray-500">{scroll.type}</span>
                </div>
                <p className="text-sm">💳 License Fee: {scroll.licenseFee}</p>
                <p className="text-sm">📦 Monthly: {scroll.monthly}</p>
                <p className="text-sm">💰 Royalty: {scroll.royalty}</p>
                <p className="text-xs mt-1 text-gray-600">⏱ Countdown: {scroll.countdown}s</p>
                <p className="text-xs text-gray-600">🗺️ Region: {scroll.region}</p>
                <p className="text-xs text-gray-500 mt-1">Vault ID: {scroll.vaultId}</p>
                <a href={scroll.claimRoot} target="_blank" className="text-blue-600 text-xs underline mt-1 inline-block">🌐 ClaimRoot™</a>
                <div className="mt-4 h-2 w-full bg-gray-200 rounded">
                  <div className="bg-green-400 h-2 rounded animate-pulse" style={{ width: `${scroll.countdown}%` }}></div>
                </div>
                <div className="h-32 mt-4">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={scroll.data}>
                      <XAxis dataKey="time" hide />
                      <YAxis domain={['auto', 'auto']} hide />
                      <Tooltip />
                      <Line type="monotone" dataKey="value" stroke={scroll.color} strokeWidth={2} dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
                <button className="mt-4 w-full bg-black text-white py-2 text-sm rounded">Pay with VaultPay™</button>
              </div>
            ))}
          </div>

          <div className="mt-12 bg-white border-t pt-6">
            <h2 className="text-xl font-bold text-gray-800 mb-4">🔍 AutoBorn™ Feature Matrix</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {scrolls.map((scroll) => (
                <div key={scroll.id} className="bg-gray-50 p-4 rounded-xl shadow-inner">
                  <h3 className="text-lg font-bold text-indigo-700 mb-2">{scroll.icon} {scroll.brand}</h3>
                  <ul className="list-disc list-inside text-sm text-gray-700 space-y-1">
                    <li>📛 Type: {scroll.type}</li>
                    <li>💸 License Fee: {scroll.licenseFee}</li>
                    <li>📦 Monthly: {scroll.monthly}</li>
                    <li>💰 Royalty Model: {scroll.royalty}</li>
                    <li>🌐 ClaimRoot™ enabled</li>
                    <li>🗺️ Region Deployment: {scroll.region}</li>
                    <li>⏱ Countdown Sync: {scroll.countdown}s</li>
                    <li>🧠 Vault ID: {scroll.vaultId}</li>
                    <li>📊 Live Pulse Chart Active</li>
                    <li>🪙 VaultPay™ Payment Ready</li>
                  </ul>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<AutobornSyncGrid />, document.getElementById('autoborn-sync-root'));
  </script>

</body>
</html>
