<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OreXcel™ | JIC Mining Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/react/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js"></script>
</head>
<body class="bg-white text-gray-800 font-sans">
  <div id="root"></div>
  <script type="text/babel">

    const { useState, useEffect } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

    function OreXcelDashboard() {
      const [glupEnabled, setGlupEnabled] = useState(true);
      const [licenseValid, setLicenseValid] = useState(true);
      const [exportTriggered, setExportTriggered] = useState(false);
      const [scanInProgress, setScanInProgress] = useState(false);
      const [batchData, setBatchData] = useState([
        { name: "JIC Core A", grade: 84 },
        { name: "JIC Core B", grade: 79 },
        { name: "JIC Core C", grade: 91 }
      ]);
      const [activeTab, setActiveTab] = useState("overview");

      useEffect(() => {
        const interval = setInterval(() => {
          setBatchData(prev => prev.map(d => ({
            ...d, grade: Math.round(d.grade + (Math.random() * 4 - 2))
          })));
        }, 9000);
        return () => clearInterval(interval);
      }, []);

      const avgGrade = batchData.reduce((acc, cur) => acc + cur.grade, 0) / batchData.length;
      const minGrade = Math.min(...batchData.map(d => d.grade));
      const maxGrade = Math.max(...batchData.map(d => d.grade));

      const handleExport = () => {
        setExportTriggered(true);
        setTimeout(() => setExportTriggered(false), 1000);
      };

      const handleScan = () => {
        setScanInProgress(true);
        setTimeout(() => setScanInProgress(false), 1200);
      };

      return (
        <div className="p-6 space-y-8 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-indigo-100 to-indigo-50 p-6 rounded-lg shadow-inner">
            <div className="text-sm text-gray-500 uppercase font-semibold mb-3 flex gap-6 justify-center">
              <span>OreXcel Products</span><span>Mining Types</span><span>Scan Support</span>
              <span>FAA Learning</span><span>Ethics Chain</span><span>Partners</span>
              <span>About Node</span><span>Explore FAA</span>
            </div>
            <div className="text-center space-y-4">
              <h2 className="text-4xl font-extrabold text-indigo-900">OreXcel™. Made Grid Real.</h2>
              <p className="text-indigo-700 max-w-2xl mx-auto">Empower real-time mining traceability, GLUP-grade logic, and scroll-secure insight via JIC OreXcel Nodes.</p>
              <div className="flex justify-center gap-4 mt-4">
                <a href="/sectors/mining/orexcel-pulse.html" className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded shadow">📡 Launch Grid Core</a>
                <a href="/sectors/mining/faa-clausevault.html" className="bg-gray-100 hover:bg-gray-300 text-black font-semibold py-2 px-6 rounded shadow">📊 FAA ClauseVault</a>
              </div>
            </div>
          </div>

          <h1 className="text-3xl font-extrabold">OreXcel™ Tier-4 FAA Dashboard — JIC Mining Node</h1>

          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div className="p-4 bg-white border rounded"><p className="text-sm text-gray-500">Average Grade</p><p className="text-2xl text-blue-600 font-bold">{avgGrade.toFixed(2)}%</p></div>
            <div className="p-4 bg-white border rounded"><p className="text-sm text-gray-500">Minimum Grade</p><p className="text-2xl text-red-500 font-bold">{minGrade}%</p></div>
            <div className="p-4 bg-white border rounded"><p className="text-sm text-gray-500">Maximum Grade</p><p className="text-2xl text-green-600 font-bold">{maxGrade}%</p></div>
            <div className="p-4 bg-white border rounded flex items-center gap-2"><span className="font-semibold text-sm">FAA Compliance Grade:</span><span className="text-green-500">Pass</span></div>
          </div>

          <div className="mt-6">
            <div className="flex gap-3 flex-wrap mb-4">
              {["overview", "metrics", "report", "settings", "alerts", "timeline", "token"].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 font-medium rounded ${activeTab === tab ? "bg-indigo-600 text-white" : "bg-gray-100 text-gray-800 hover:bg-gray-200"}`}>{tab.replace(/^\w/, c => c.toUpperCase())}</button>
              ))}
            </div>

            {/* === OVERVIEW === */}
            {activeTab === "overview" && (
              <div className="p-4 bg-white border rounded">
                <h2 className="text-lg font-bold mb-4">Signal Feed — Grade Chart</h2>
                <ResponsiveContainer width="100%" height={300}>
                  <LineChart data={batchData}>
                    <XAxis dataKey="name" />
                    <YAxis />
                    <CartesianGrid strokeDasharray="3 3" />
                    <Tooltip />
                    <Line type="monotone" dataKey="grade" stroke="#00B2FF" />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            )}

            {/* === METRICS === */}
            {activeTab === "metrics" && (
              <div className="p-4 bg-white border rounded space-y-3">
                <div className="flex justify-between"><span>Yield Variance:</span><span className="text-blue-700 font-bold">{(maxGrade - minGrade).toFixed(2)}%</span></div>
                <div className="flex justify-between"><span>Grade Consistency Index:</span><span className="text-green-600">✓ Stable</span></div>
                <div className="flex justify-between"><span>Scan Time</span><span>1.2s (Simulated)</span></div>
              </div>
            )}

            {/* === REPORT === */}
            {activeTab === "report" && (
              <div className="p-4 bg-white border rounded space-y-2">
                {batchData.map((entry, idx) => (
                  <div key={idx} className="flex justify-between border p-3 rounded">
                    <span>{entry.name}</span>
                    <button className="px-3 py-1 border rounded bg-gray-50 hover:bg-gray-100 text-sm">Generate FAA Sheet</button>
                  </div>
                ))}
              </div>
            )}

            {/* === SETTINGS === */}
            {activeTab === "settings" && (
              <div className="p-4 bg-white border rounded space-y-4">
                <div className="flex justify-between"><label htmlFor="glup">GLUP Logic</label><input type="checkbox" id="glup" checked={glupEnabled} onChange={e => setGlupEnabled(e.target.checked)} /></div>
                <div className="flex justify-between"><span>FAA Lock</span><span>🔒</span></div>
                <div className="flex justify-between"><span>License</span><span className={licenseValid ? "text-green-600" : "text-red-600"}>{licenseValid ? '✅ Valid' : '⚠️ Invalid'}</span></div>
              </div>
            )}

            {/* === ALERTS === */}
            {activeTab === "alerts" && (
              <div className="p-4 bg-white border rounded space-y-2">
                <div className="text-yellow-600">⚠ No Ethics Breach Reported</div>
                <div className="text-green-600">✅ GLUP Logic Passed</div>
              </div>
            )}

            {/* === TIMELINE === */}
            {activeTab === "timeline" && (
              <div className="p-4 bg-white border rounded space-y-2 text-sm text-gray-600">
                <p>🕒 22:20 — Scan Executed (JIC Core C)</p>
                <p>🕒 22:19 — FAA ClauseIndex Synced</p>
                <p>🕒 22:18 — Node Session Initialized</p>
              </div>
            )}

            {/* === TOKEN === */}
            {activeTab === "token" && (
              <div className="p-4 bg-white border rounded space-y-4">
                <button onClick={handleExport} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded">📥 Export Full Report (PDF)</button>
                <button className="w-full border border-blue-600 text-blue-600 py-2 rounded hover:bg-blue-50">☁️ Push to FAA Token Grid</button>
                <a href="/sectors/mining/orexcel-pulse.html" className="block mt-4 text-center bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 px-6 rounded-lg shadow-lg">⚡ Open Full FAA Grid Overview</a>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<OreXcelDashboard />, document.getElementById('root'));
  </script>
</body>
</html>
