<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Builder – CodeNest™</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #101010;
      color: #f5f5f5;
    }
    .container {
      max-width: 960px;
      margin: auto;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ffd700;
    }
    form {
      background-color: #1a1a1a;
      padding: 2rem;
      border-radius: 10px;
      border: 1px solid #333;
    }
    label {
      display: block;
      margin: 1rem 0 0.5rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: none;
      background-color: #2a2a2a;
      color: #fefefe;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
    }
    button {
      margin-top: 2rem;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      background-color: #ffd700;
      color: #000;
      cursor: pointer;
    }
    .info {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ Scroll Builder — Deploy Your CodeNest™ Scroll</h1>
    <form>
      <label for="scrollName">Scroll Name</label>
      <input type="text" id="scrollName" name="scrollName" placeholder="e.g. VaultIntro Scroll">

      <label for="scrollType">Scroll Type</label>
      <select id="scrollType" name="scrollType">
        <option value="html">Basic HTML Page</option>
        <option value="component">FAA Component (Navbar, Footer, Form)</option>
        <option value="checkout">Single Item Checkout</option>
        <option value="marketing">Marketing Scroll (Promo)</option>
      </select>

      <label for="htmlCode">HTML Code</label>
      <textarea id="htmlCode" name="htmlCode" rows="8" placeholder="Paste or write HTML code..."></textarea>

      <label for="cssCode">CSS Styling</label>
      <textarea id="cssCode" name="cssCode" rows="6" placeholder="Add scroll styling here..."></textarea>

      <label for="jsCode">JavaScript (Optional)</label>
      <textarea id="jsCode" name="jsCode" rows="5" placeholder="Optional scripts, claim triggers, hover FX..."></textarea>

      <label for="claim">Scroll Licensing with ClaimRoot™?</label>
      <select id="claim" name="claim">
        <option value="yes">Yes — Activate scroll claim</option>
        <option value="no">No — Build only</option>
      </select>

      <button type="submit">Compile Scroll & Save</button>
      <p class="info">Your scroll will be saved to your local CodeNest workspace with optional auto-deploy to FAA.Zone.</p>
    </form>
  </div>
</body>
</html>
