<!DOCTYPE html>
<html lang="en" data-vault="FAA.Zone" data-claim="ClaimRoot™" data-brand="CodeNest™">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Project – CodeNest™</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #111;
      color: #f4f4f4;
    }
    .container {
      max-width: 960px;
      margin: auto;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ffd700;
    }
    form {
      background-color: #1a1a1a;
      padding: 2rem;
      border-radius: 10px;
      border: 1px solid #333;
    }
    label {
      display: block;
      margin: 1rem 0 0.5rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem;
      border-radius: 6px;
      border: none;
      background-color: #2a2a2a;
      color: #fefefe;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
    }
    button {
      margin-top: 2rem;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      background-color: #ffd700;
      color: #000;
      cursor: pointer;
    }
    button:hover {
      background-color: #ffe666;
    }
    .info {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧱 Start a New Scroll Project</h1>
    <form action="/brands/codenest/editor-landing.html" method="get">
      <label for="projectName">Project Name</label>
      <input type="text" id="projectName" name="projectName" placeholder="e.g. UrbanNest Launch Scroll" required>

      <label for="template">Choose Template</label>
      <select id="template" name="template" required>
        <option value="editor-blank.html">Blank Scroll</option>
        <option value="editor-landing.html">Landing Page</option>
        <option value="editor-checkout.html">ScrollCart Checkout</option>
        <option value="editor-microsite.html">VaultDNS Microsite</option>
      </select>

      <label for="description">Project Description</label>
      <textarea id="description" name="description" rows="5" placeholder="Describe your project goals, use case, or scroll story..."></textarea>

      <label for="region">Deployment Region</label>
      <select id="region" name="region">
        <option value="global">Global</option>
        <option value="local">Local Only</option>
        <option value="street">Street Scroll (Pop-up deploy)</option>
      </select>

      <label for="claim">Enable ClaimRoot™ Auto-License?</label>
      <select id="claim" name="claim">
        <option value="yes">Yes – License this scroll</option>
        <option value="no">No – Just save it</option>
      </select>

      <button type="submit">Create Project</button>
      <p class="info">Scrolls will be saved in your CodeNest workspace and can be synced to FAA.Zone upon deployment.</p>
    </form>
  </div>
</body>
</html>
