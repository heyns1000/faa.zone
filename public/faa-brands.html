<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📦 7038 FAA Brands</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulseBrands {
      0%, 100% { transform: scaleX(0); }
      50% { transform: scaleX(1); }
    }
    .animate-pulseBrands {
      animation: pulseBrands 9s infinite ease-in-out;
      transform-origin: left;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

<!-- Brands Pulse Top Bar -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 via-pink-500 to-purple-600 animate-pulseBrands z-50"></div>

<main class="w-full max-w-3xl bg-gray-900 border border-purple-500 rounded-2xl p-6 shadow-xl space-y-6">
  <h1 class="text-3xl font-extrabold text-purple-400 text-center">📦 7038 FAA Brands</h1>
  <p class="text-sm text-center text-gray-400">FAA.Zone brand vault access and seedwave scroll engine.</p>

  <textarea id="prompt" rows="6" placeholder="Enter brand sync prompt..."
    class="w-full bg-black border border-purple-700 text-purple-200 placeholder:text-purple-400 rounded-xl px-4 py-3 text-sm shadow-inner"></textarea>

  <div class="flex justify-between items-center">
    <button id="sendBtn"
      class="bg-purple-400 hover:bg-purple-500 text-black font-bold px-6 py-3 rounded-full shadow-lg transition-all">
      ➤ Sync Brands
    </button>
    <button onclick="clearPrompt()" class="text-xs underline text-white">Clear</button>
  </div>

  <pre id="response"
    class="bg-black border border-purple-700 text-purple-300 rounded-xl p-4 text-sm whitespace-pre-wrap overflow-x-auto">
⚡️ Brands sync interface initialized...
  </pre>
</main>

<script>
  async function sendPrompt() {
    const input = document.getElementById("prompt").value.trim();
    const output = document.getElementById("response");

    if (!input) {
      output.textContent = "⚠️ Please enter a prompt.";
      return;
    }

    output.textContent = "🔄 Sending brands sync scroll to VaultBridge...";

    try {
      const res = await fetch("https://faa.zone/vaultbridge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: input })
      });

      const data = await res.json();
      output.textContent = data.reply || "✅ VaultGPT acknowledged but returned no scroll.";
    } catch (err) {
      output.textContent = `❌ Connection failed.\n\n🧬 OmniDrop fallback triggered:\n"${input}"`;
    }
  }

  function clearPrompt() {
    document.getElementById("prompt").value = "";
    document.getElementById("response").textContent = "⚡️ Brands cleared. Ready.";
  }

  document.getElementById("sendBtn").addEventListener("click", sendPrompt);
</script>

</body>
</html>
