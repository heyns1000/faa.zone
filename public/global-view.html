<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🌍 Global View GPT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulseEarth {
      0%, 100% { transform: scaleX(0); }
      50% { transform: scaleX(1); }
    }
    .animate-pulseEarth {
      animation: pulseEarth 9s infinite ease-in-out;
      transform-origin: left;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

  <!-- GlobalPulse Top Bar -->
  <div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 via-green-400 to-blue-500 animate-pulseEarth z-50"></div>

  <main class="w-full max-w-3xl bg-gray-900 border border-blue-500 rounded-2xl p-6 shadow-xl space-y-6">
    <h1 class="text-3xl font-extrabold text-blue-400 text-center">🌍 Global View GPT</h1>
    <p class="text-sm text-center text-gray-400">Sector-wide global intelligence synchronizer for FAA.Zone deployments.</p>

    <textarea id="prompt" rows="6" placeholder="Enter global sync prompt..."
      class="w-full bg-black border border-blue-700 text-blue-200 placeholder:text-blue-400 rounded-xl px-4 py-3 text-sm shadow-inner"></textarea>

    <div class="flex justify-between items-center">
      <button id="sendBtn"
        class="bg-blue-400 hover:bg-blue-500 text-black font-bold px-6 py-3 rounded-full shadow-lg transition-all">
        ➤ Sync Global
      </button>
      <button onclick="clearPrompt()" class="text-xs underline text-white">Clear</button>
    </div>

    <pre id="response"
      class="bg-black border border-blue-700 text-blue-300 rounded-xl p-4 text-sm whitespace-pre-wrap overflow-x-auto">
⚡️ Global View interface initialized...
    </pre>
  </main>

  <script>
    async function sendPrompt() {
      const input = document.getElementById("prompt").value.trim();
      const output = document.getElementById("response");

      if (!input) {
        output.textContent = "⚠️ Please enter a prompt.";
        return;
      }

      output.textContent = "🔄 Sending global sync scroll to VaultBridge...";

      try {
        const res = await fetch("https://faa.zone/vaultbridge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: input })
        });

        const data = await res.json();
        output.textContent = data.reply || "✅ VaultGPT acknowledged but returned no scroll.";
      } catch (err) {
        output.textContent = `❌ Connection failed.\n\n🧬 OmniDrop fallback triggered:\n"${input}"`;
      }
    }

    function clearPrompt() {
      document.getElementById("prompt").value = "";
      document.getElementById("response").textContent = "⚡️ Global View cleared. Ready.";
    }

    document.getElementById("sendBtn").addEventListener("click", sendPrompt);
  </script>

</body>
</html>
